name: Tauri Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tauri-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libegl1-mesa libegl1 \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (release)
        run: cargo tauri build --target x86_64-unknown-linux-gnu --bundles deb,appimage
        env:
          # Skip the default artifact upload built into tauri-action
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: List and package artifacts
        run: |
          BUNDLE=src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
          echo "=== Bundle tree ==="
          find "$BUNDLE" -type f -ls 2>/dev/null || echo "Bundle dir not found"
          echo "=== Binary check ==="
          file src-tauri/target/x86_64-unknown-linux-gnu/release/nine-rings 2>/dev/null || echo "Binary not found"
          echo "=== Copying deb artifact ==="
          mkdir -p artifacts
          if ls "$BUNDLE/deb/"*.deb 2>/dev/null; then
            cp "$BUNDLE/deb/"*.deb artifacts/
          fi
          echo "=== Rebundle AppImage with EGL ==="
          if ls "$BUNDLE/appimage/"*.AppImage 2>/dev/null; then
            APPIMAGE=$(ls "$BUNDLE/appimage/"*.AppImage | head -1)
            chmod +x "$APPIMAGE"
            # Extract
            "$APPIMAGE" --appimage-extract
            # Inject Mesa EGL + GL libraries into the payload
            mkdir -p squashfs-root/usr/lib
            cp -v /usr/lib/x86_64-linux-gnu/libEGL.so.1 squashfs-root/usr/lib/
            cp -v /usr/lib/x86_64-linux-gnu/libGL.so.1 squashfs-root/usr/lib/
            cp -v /usr/lib/x86_64-linux-gnu/libGLX.so.0 squashfs-root/usr/lib/ 2>/dev/null || true
            cp -v /usr/lib/x86_64-linux-gnu/libGLdispatch.so.0 squashfs-root/usr/lib/ 2>/dev/null || true
            # Download appimagetool (not in apt)
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ./appimagetool-x86_64.AppImage --no-appstream --comp zstd \
              squashfs-root "$BUNDLE/appimage/Nine_Rings-egl.AppImage"
            cp -v "$BUNDLE/appimage/Nine_Rings-egl.AppImage" artifacts/
            ls -lh artifacts/
          else
            echo "No AppImage found, checking for binary only..."
            ls -lh src-tauri/target/x86_64-unknown-linux-gnu/release/nine-rings 2>/dev/null || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nine-rings-tauri-linux-x86_64
          path: artifacts/*
          if-no-files-found: error
