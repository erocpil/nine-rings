name: Tauri Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tauri-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri (release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-unknown-linux-gnu

      - name: Package AppImage
        run: |
          BUNDLE=src-tauri/target/x86_64-unknown-linux-gnu/release/bundle
          echo "=== Bundle contents ==="
          find "$BUNDLE" -type f -ls 2>/dev/null || true
          # Find the .deb or AppImage
          if [ -d "$BUNDLE/deb" ]; then
            echo "=== .deb package ==="
            ls -lh "$BUNDLE/deb/"
          fi
          if [ -d "$BUNDLE/appimage" ]; then
            echo "=== AppImage ==="
            ls -lh "$BUNDLE/appimage/"
          fi
          echo "=== Binary ==="
          if [ -f "$BUNDLE/appimage/nine-rings"*".AppImage" ]; then
            cp "$BUNDLE/appimage/nine-rings"*".AppImage" nine-rings-tauri-linux-x86_64.AppImage
          elif [ -f "$BUNDLE/deb/nine-rings"*".deb" ]; then
            cp "$BUNDLE/deb/nine-rings"*".deb" nine-rings-tauri-linux-x86_64.deb
          else
            echo "No AppImage or deb found, listing bundle dir..."
            find "$BUNDLE" -maxdepth 3 -type f
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nine-rings-tauri-linux-x86_64
          path: |
            nine-rings-tauri-linux-x86_64.AppImage
            nine-rings-tauri-linux-x86_64.deb
          if-no-files-found: warn
