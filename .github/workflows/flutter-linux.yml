name: Flutter Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flutter-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libx11-dev

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Static analysis
        working-directory: flutter_app
        continue-on-error: true
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Linux (release)
        working-directory: flutter_app
        run: flutter build linux

      - name: Verify and package
        working-directory: flutter_app
        run: |
          BUNDLE=build/linux/x64/release/bundle
          echo "=== Bundle contents ==="
          ls -la "$BUNDLE"
          echo "=== Binary info ==="
          file "$BUNDLE/nine_rings"
          du -sh "$BUNDLE"
          echo "=== Packaging tar.gz ==="
          tar czf nine-rings-linux-x64.tar.gz -C build/linux/x64/release bundle
          ls -lh nine-rings-linux-x64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nine-rings-flutter-linux-x64
          path: flutter_app/nine-rings-linux-x64.tar.gz
          if-no-files-found: error
