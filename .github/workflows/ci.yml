name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──── Schema 校验 + Web 构建（仅校验，不发布 artifact）────

  check:
    name: Schema Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Schema consistency check
        run: |
          pip install pyyaml
          python3 scripts/gen-schema.py --check
      - run: npm run build
        env:
          NODE_ENV: production
      - name: Check dist exists
        run: |
          test -f dist/index.html
          ls dist/assets/index-*.js > /dev/null

  # ──── 发布到 GitHub Release（仅 tag 推送时）────

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: release/

      - name: List release files
        run: find release/ -type f -exec ls -lh {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          token: ${{ secrets.GITHUB_TOKEN }}
