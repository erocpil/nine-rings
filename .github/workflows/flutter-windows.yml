name: Windows Build (Flutter + Tauri)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Flutter 桌面版 ──────────────────────────────────────────
  flutter-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.9.2'
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nine-rings-flutter-windows-x64
          path: flutter_app/build/windows/x64/runner/Release/
          if-no-files-found: error

  # ── Tauri 桌面版 ────────────────────────────────────────────
  tauri-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri (release)
        run: tauri build --ci

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: nine-rings-tauri-windows-installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: nine-rings-tauri-windows-portable
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
